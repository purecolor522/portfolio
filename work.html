<!DOCTYPE html>
<html lang="zh-Hant" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品詳情 · 蘇雅軒</title>
  <meta name="description" content="作品案例：問題、我的角色、過程與成果。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- 預先編譯的 Tailwind（取代 CDN，載入更快） -->
  <link rel="stylesheet" href="dist.css" />

  <script>
    (function () {
      // 預設淺色，除非使用者手動選了深色
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <style>
    /* 台北黑體（Taipei Sans TC，僅含大標題用字的瘦身版） */
    @font-face {
      font-family: 'Taipei Sans TC';
      font-style: normal; font-weight: 400; font-display: swap;
      src: url('fonts/TaipeiSansTC-headline.woff2') format('woff2');
    }
    :root {
      --bg: 245 245 242;
      --surface: 255 255 255;
      --ink: 24 24 27;
      --muted: 112 112 118;
      --line: 219 219 214;
      --accent: 17 122 80;
      --accent-hover: 14 100 66;
    }
    .dark {
      --bg: 11 12 14;
      --surface: 20 21 25;
      --ink: 224 226 224;
      --muted: 128 134 140;
      --line: 38 40 46;
      --accent: 122 226 165;
      --accent-hover: 150 236 186;
    }
    body {
      font-feature-settings: "ss01";
      background-image: linear-gradient(rgb(var(--line) / .4) 1px, transparent 1px),
                        linear-gradient(90deg, rgb(var(--line) / .4) 1px, transparent 1px);
      background-size: 46px 46px; background-position: -1px -1px; background-attachment: fixed;
    }
    .rounded-lg, .rounded-xl, .rounded-2xl, .rounded-3xl, .rounded-full { border-radius: 3px !important; }
    .reveal { opacity: 1 !important; transform: none !important; }
    .dv-btn { color: rgb(var(--muted)); transition: background-color .12s, color .12s; }
    .dv-btn.active { background: rgb(var(--ink)); color: rgb(var(--bg)); }
    .device { width: 390px; max-width: calc(100vw - 40px); background: #050608; padding: 12px; border: 1px solid rgb(var(--line));
      border-radius: 42px; box-shadow: 0 40px 90px rgba(0,0,0,.55); position: relative; }
    .device::before { content: ''; position: absolute; top: 19px; left: 50%; transform: translateX(-50%);
      width: 80px; height: 5px; border-radius: 999px; background: #2a2d33; z-index: 2; }
    #phone-frame { width: 100%; height: min(76vh, 760px); border: 0; border-radius: 30px; background: rgb(var(--bg)); display: block; }
    .cur { display: inline-block; width: .5ch; height: 1.02em; margin-left: .14em; transform: translateY(.14em);
      background: rgb(var(--accent)); animation: blink 1.15s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .cur { animation: none; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>

<body class="bg-bg text-ink font-sans antialiased selection:bg-accent selection:text-white">
  <div class="grain"></div>

  <!-- 導覽列 -->
  <header class="sticky top-0 z-50 backdrop-blur-md bg-bg/80 border-b border-line/70">
    <nav class="max-w-content mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2.5 font-medium tracking-tight">
        <span class="text-xl font-bold tracking-tight leading-none">C:\</span>
        <span class="text-[15px]">蘇雅軒<span class="cur"></span></span>
      </a>
      <div class="flex items-center gap-2">
        <a href="index.html#work" class="text-[14px] text-muted hover:text-accent transition-colors px-3">所有作品</a>
        <button id="device-toggle" class="hidden sm:grid place-items-center w-9 h-9 rounded-full border border-line hover:border-accent text-muted hover:text-accent transition-colors" aria-label="切換電腦／手機版預覽">
          <svg id="dv-phone" class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>
          <svg id="dv-desktop" class="w-[18px] h-[18px] hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </button>
        <button id="theme-toggle" aria-label="切換深淺色" class="grid place-items-center w-9 h-9 rounded-full border border-line hover:border-accent text-muted hover:text-accent transition-colors">
          <svg class="w-[18px] h-[18px] hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="w-[18px] h-[18px] block dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
      </div>
    </nav>
  </header>

  <!-- 作品內容由 JS 渲染進這裡 -->
  <main id="case" class="max-w-content mx-auto px-5 sm:px-8"></main>

  <footer class="border-t border-line mt-24">
    <div class="max-w-content mx-auto px-5 sm:px-8 py-10 flex flex-col sm:flex-row items-center justify-between gap-4 text-[13px] text-muted">
      <p>© 2026 蘇雅軒 · 產品經理作品集</p>
      <p>purecolor522@gmail.com</p>
    </div>
  </footer>

  <!-- 手機版預覽 -->
  <div id="phone-overlay" class="hidden fixed inset-0 z-[100] items-center justify-center bg-black/75 backdrop-blur-sm p-5">
    <div class="flex flex-col items-center gap-4">
      <div class="device">
        <iframe id="phone-frame" title="手機版預覽" loading="lazy"></iframe>
      </div>
      <button id="exit-mobile" class="inline-flex items-center gap-2 border border-line bg-surface text-ink text-[13px] px-4 h-9 hover:border-accent transition-colors">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        回到電腦版
      </button>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const root = document.documentElement;
    document.getElementById('theme-toggle').addEventListener('click', () => {
      root.classList.toggle('dark');
      localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
    });

    // ---------- 電腦／手機版預覽切換（單鍵切換） ----------
    (function () {
      const inFrame = new URLSearchParams(location.search).has('frame') || window.self !== window.top;
      const dt = document.getElementById('device-toggle');
      if (!dt) return;
      if (inFrame) { dt.remove(); return; }
      const overlay = document.getElementById('phone-overlay');
      const frame = document.getElementById('phone-frame');
      const phoneIcon = document.getElementById('dv-phone');
      const deskIcon = document.getElementById('dv-desktop');
      const setOpen = (open) => {
        if (open && !frame.getAttribute('src')) {
          const u = new URL(location.href);
          u.searchParams.set('frame', 'mobile');
          frame.src = u.pathname + u.search;
        }
        overlay.classList.toggle('hidden', !open);
        overlay.classList.toggle('flex', open);
        document.body.style.overflow = open ? 'hidden' : '';
        phoneIcon.classList.toggle('hidden', open);
        deskIcon.classList.toggle('hidden', !open);
        dt.classList.toggle('text-accent', open);
        dt.classList.toggle('border-accent', open);
      };
      dt.addEventListener('click', () => setOpen(overlay.classList.contains('hidden')));
      document.getElementById('exit-mobile').addEventListener('click', () => setOpen(false));
      overlay.addEventListener('click', (e) => { if (e.target === overlay) setOpen(false); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setOpen(false); });
    })();

    // 取網址 id，找到對應作品
    const id = new URLSearchParams(location.search).get('id');
    const works = window.works || [];
    const idx = works.findIndex((w) => w.id === id);
    const w = works[idx];
    const main = document.getElementById('case');

    if (!w) {
      main.innerHTML = `
        <div class="py-32 text-center">
          <p class="font-serif text-[15px] text-accent mb-4">404</p>
          <h1 class="font-tp text-4xl font-medium tracking-tight">找不到這件作品</h1>
          <p class="mt-3 text-muted">這個連結可能過期了，或作品已調整。</p>
          <a href="index.html#work" class="mt-8 inline-flex items-center gap-2 rounded-full bg-accent hover:bg-accent-hover text-white text-[15px] font-medium px-6 h-12 transition-colors">回到所有作品</a>
        </div>`;
    } else {
      const next = works[(idx + 1) % works.length];
      const img = (seed, w2, h2) => `https://picsum.photos/seed/${seed}/${w2}/${h2}`;
      const shots = w.images && w.images.length ? w.images : null; // 設計作品：真實圖片陣列

      // 作品圖：設計作品用完整圖片（不裁切）；其他用 16:9 示意圖
      const visualBlock = shots
        ? `<div class="${w.category === 'design' ? 'max-w-[720px] mx-auto' : 'max-w-[860px] mx-auto'}">` + shots.map((src, i) => `
            <div class="mt-6 overflow-hidden rounded-2xl border border-line bg-surface ${i === 0 ? '' : 'reveal'}">
              <img src="${src}" alt="${w.title}${shots.length > 1 ? ' ' + (i + 1) : ''}" class="w-full h-auto" loading="${i === 0 ? 'eager' : 'lazy'}" />
            </div>`).join('') + `</div>`
        : `<div class="mt-12 overflow-hidden rounded-2xl border border-line aspect-[16/9]">
             <img src="${img(w.seed, 1600, 900)}" alt="${w.title}" class="w-full h-full object-cover" />
           </div>`;

      // 問題 / 過程 / 成果：只有填了資料才會出現（設計作品通常不需要）
      const problemBlock = w.problem ? `
        <section class="mt-20 grid lg:grid-cols-12 gap-8 lg:gap-12 reveal">
          <div class="lg:col-span-4"><h2 class="font-serif text-2xl font-medium tracking-tight">問題</h2></div>
          <div class="lg:col-span-8 max-w-prose"><p class="text-xl sm:text-2xl leading-relaxed tracking-tight">${w.problem}</p></div>
        </section>` : '';

      const approachBlock = (w.approach && w.approach.length) ? `
        <section class="mt-20 grid lg:grid-cols-12 gap-8 lg:gap-12 reveal">
          <div class="lg:col-span-4"><h2 class="font-serif text-2xl font-medium tracking-tight">過程</h2></div>
          <div class="lg:col-span-8">
            <div class="divide-y divide-line border-t border-line">
              ${w.approach.map((a, i) => `
                <div class="grid grid-cols-12 gap-4 py-7">
                  <p class="col-span-2 sm:col-span-1 font-serif text-accent text-[18px]">${String(i + 1).padStart(2, '0')}</p>
                  <h3 class="col-span-10 sm:col-span-3 text-lg font-medium tracking-tight">${a.step}</h3>
                  <p class="col-span-12 sm:col-span-8 text-muted leading-relaxed">${a.text}</p>
                </div>`).join('')}
            </div>
          </div>
        </section>` : '';

      const outcomesBlock = (w.outcomes && w.outcomes.length) ? `
        <section class="mt-20 reveal">
          <h2 class="font-serif text-2xl font-medium tracking-tight mb-8">成果</h2>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-x-10 gap-y-8 border-t border-line pt-10">
            ${w.outcomes.map((o) => `
              <div>
                <p class="font-serif text-5xl sm:text-6xl tracking-tight text-accent">${o.value}</p>
                <p class="mt-3 text-[14px] text-muted">${o.label}</p>
              </div>`).join('')}
          </div>
        </section>` : '';

      // 洞察：使用者是誰、核心發現（旗艦案例用）
      const insightBlock = w.insight ? `
        <section class="mt-20 grid lg:grid-cols-12 gap-8 lg:gap-12 reveal">
          <div class="lg:col-span-4"><h2 class="font-serif text-2xl font-medium tracking-tight">洞察</h2></div>
          <div class="lg:col-span-8 max-w-prose">
            <p class="text-lg leading-relaxed text-muted">${w.insight}</p>
            ${(w.personas && w.personas.length) ? `<div class="mt-8 grid sm:grid-cols-2 gap-5">
              ${w.personas.map((p) => `<div class="border border-line bg-surface/30 p-5">
                <p class="font-mono text-[12px] tracking-[0.18em] text-accent mb-2">&gt; ${p.who}</p>
                <p class="text-[15px] leading-relaxed">${p.need}</p>
              </div>`).join('')}
            </div>` : ''}
          </div>
        </section>` : '';

      // 取捨與決策：做了什麼、刻意不做什麼，為什麼（PM 判斷力的關鍵訊號）
      const decisionsBlock = (w.decisions && w.decisions.length) ? `
        <section class="mt-20 grid lg:grid-cols-12 gap-8 lg:gap-12 reveal">
          <div class="lg:col-span-4"><h2 class="font-serif text-2xl font-medium tracking-tight">取捨與決策</h2></div>
          <div class="lg:col-span-8">
            <div class="divide-y divide-line border-t border-line">
              ${w.decisions.map((d) => `
                <div class="py-7">
                  <h3 class="text-lg font-medium tracking-tight flex items-start gap-2"><span class="text-accent">→</span>${d.choice}</h3>
                  <p class="mt-2 text-muted leading-relaxed sm:pl-6">${d.why}</p>
                </div>`).join('')}
            </div>
          </div>
        </section>` : '';

      // 回顧與下一步：學到什麼、下次會怎麼改（成熟度訊號）
      const reflectionBlock = (w.reflection && w.reflection.length) ? `
        <section class="mt-20 grid lg:grid-cols-12 gap-8 lg:gap-12 reveal">
          <div class="lg:col-span-4"><h2 class="font-serif text-2xl font-medium tracking-tight">回顧與下一步</h2></div>
          <div class="lg:col-span-8 max-w-prose">
            <ul class="space-y-4">
              ${w.reflection.map((r) => `<li class="flex items-start gap-3 text-muted leading-relaxed"><span class="text-accent mt-1">▸</span><span>${r}</span></li>`).join('')}
            </ul>
          </div>
        </section>` : '';

      // 「畫面」只給非設計作品（picsum 示意圖）；設計作品的圖已在上方完整呈現
      const galleryBlock = (!shots && w.gallery && w.gallery.length) ? `
        <section class="mt-20 reveal">
          <h2 class="font-serif text-2xl font-medium tracking-tight mb-8">畫面</h2>
          <div class="grid sm:grid-cols-2 gap-5">
            <div class="overflow-hidden rounded-2xl border border-line aspect-[4/3] sm:col-span-2">
              <img src="${img(w.gallery[0], 1400, 800)}" alt="${w.title} 畫面 1" class="w-full h-full object-cover" loading="lazy" />
            </div>
            ${w.gallery.slice(1, 3).map((g, i) => `
              <div class="overflow-hidden rounded-2xl border border-line aspect-[4/3]">
                <img src="${img(g, 800, 600)}" alt="${w.title} 畫面 ${i + 2}" class="w-full h-full object-cover" loading="lazy" />
              </div>`).join('')}
          </div>
        </section>` : '';

      main.innerHTML = `
        <!-- 返回 -->
        <a href="index.html#work" class="inline-flex items-center gap-2 mt-10 text-[14px] text-muted hover:text-accent transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
          所有作品
        </a>

        <!-- 標題區 -->
        <div class="mt-8 max-w-prose">
          <p class="text-[12px] tracking-[0.2em] text-accent mb-4">// ${w.tag}</p>
          <h1 class="font-tp text-4xl sm:text-5xl lg:text-6xl font-medium tracking-tight leading-[1.12]">${w.title}</h1>
          <p class="mt-6 text-xl text-muted leading-relaxed">${w.summary}</p>
          <div class="mt-6 flex flex-wrap items-center gap-3">
            ${w.live ? `<a href="${w.live}" target="_blank" rel="noopener" class="inline-flex items-center gap-2 rounded-full bg-accent hover:bg-accent-hover text-white text-[15px] font-medium px-6 h-11 hover:-translate-y-px transition-all">查看上線版本<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg></a>` : ''}
            ${w.repo ? `<a href="${w.repo}" target="_blank" rel="noopener" class="inline-flex items-center gap-2 rounded-full border border-line hover:border-accent text-[15px] font-medium px-6 h-11 transition-colors">查看原始碼<svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.2.8-.5v-1.7c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.3 4.7 18.3 5 18.3 5c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.6.8.5 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg></a>` : ''}
          </div>
        </div>

        <!-- 後設資料 -->
        <dl class="mt-12 grid grid-cols-2 md:grid-cols-4 gap-y-6 border-t border-line pt-8">
          ${metaCell('角色', w.role)}
          ${metaCell('時程', w.timeline)}
          ${metaCell('團隊', w.team)}
          ${toolsCell(w.tools)}
        </dl>

        ${visualBlock}
        ${problemBlock}
        ${insightBlock}
        ${approachBlock}
        ${decisionsBlock}
        ${outcomesBlock}
        ${reflectionBlock}
        ${galleryBlock}

        <!-- 下一件 -->
        <a href="work.html?id=${next.id}" class="group mt-24 block rounded-2xl border border-line hover:border-accent bg-surface/50 p-8 sm:p-10 transition-colors reveal">
          <p class="text-[12px] uppercase tracking-[0.18em] text-muted">下一件作品</p>
          <div class="mt-2 flex items-center justify-between gap-4">
            <h3 class="font-tp text-2xl sm:text-3xl font-medium tracking-tight group-hover:text-accent transition-colors">${next.title}</h3>
            <svg class="w-7 h-7 shrink-0 text-muted group-hover:text-accent group-hover:translate-x-1 transition-all" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </div>
        </a>`;

      document.title = `${w.title} · 蘇雅軒`;
    }

    function metaCell(label, value) {
      return `<div>
        <dt class="text-[11px] uppercase tracking-[0.16em] text-muted">${label}</dt>
        <dd class="mt-1.5 text-[15px] font-medium">${value || '未填'}</dd>
      </div>`;
    }

    function toolsCell(tools) {
      const chips = (tools || []).map((t) =>
        `<span class="inline-flex items-center rounded-full border border-line px-2.5 h-7 text-[12px] text-muted">${t}</span>`
      ).join('');
      return `<div>
        <dt class="text-[11px] uppercase tracking-[0.16em] text-muted">工具</dt>
        <dd class="mt-2 flex flex-wrap gap-1.5">${chips || '未填'}</dd>
      </div>`;
    }

    // 進場動效
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!reduce) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
      }, { threshold: 0.12 });
      document.querySelectorAll('.reveal').forEach((el) => io.observe(el));
    } else {
      document.querySelectorAll('.reveal').forEach((el) => el.classList.add('in'));
    }
  </script>
</body>
</html>
