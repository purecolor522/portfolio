<text x="56" y="74" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="20" letter-spacing="4" fill="#0f7a50">// PROJECT ON A PAGE · 活動統籌</text>
<text x="56" y="130" font-size="52" font-weight="700" fill="#1b1b1f">光の慶典 · 草地敬拜音樂節</text>
<text x="56" y="172" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="22" fill="#6c6c72">2024 / 12 / 14 · 台南浸信會大草地 · 16:00–20:00</text>
<line x1="56" y1="200" x2="1224" y2="200" stroke="#1b1b1f" stroke-width="2"/>
<rect x="56" y="228" width="568" height="200" fill="#ffffff" stroke="#e2e0d9" stroke-width="1.5"/>
<rect x="56" y="228" width="6" height="200" fill="#0f7a50"/>
<text x="84" y="272" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="26" font-weight="700" fill="#0f7a50">01</text>
<text x="128" y="272" font-size="25" font-weight="700" fill="#1b1b1f">是什麼 · 服務誰</text>
<text x="128" y="292" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="13" letter-spacing="2" fill="#6c6c72">WHAT / WHO</text>
<text x="84" y="330" font-size="21" fill="#1b1b1f">戶外草地福音音樂節：音樂演出 × 市集 × </text>
<text x="84" y="360" font-size="21" fill="#1b1b1f">文青生命故事。對象是福音朋友與多間夥伴教會家人。</text>
<rect x="656" y="228" width="568" height="200" fill="#ffffff" stroke="#e2e0d9" stroke-width="1.5"/>
<rect x="656" y="228" width="6" height="200" fill="#0f7a50"/>
<text x="684" y="272" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="26" font-weight="700" fill="#0f7a50">02</text>
<text x="728" y="272" font-size="25" font-weight="700" fill="#1b1b1f">目標</text>
<text x="728" y="292" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="13" letter-spacing="2" fill="#6c6c72">GOAL</text>
<text x="684" y="330" font-size="21" fill="#1b1b1f">用低壓力的同樂，和福音朋友建立關係、串連夥伴教會</text>
<text x="684" y="360" font-size="21" fill="#1b1b1f">——不是純聚會，而是「來得舒服、留得下來」。</text>
<rect x="56" y="452" width="568" height="200" fill="#ffffff" stroke="#e2e0d9" stroke-width="1.5"/>
<rect x="56" y="452" width="6" height="200" fill="#0f7a50"/>
<text x="84" y="496" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="26" font-weight="700" fill="#0f7a50">03</text>
<text x="128" y="496" font-size="25" font-weight="700" fill="#1b1b1f">時程</text>
<text x="128" y="516" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="13" letter-spacing="2" fill="#6c6c72">TIMELINE</text>
<text x="84" y="554" font-size="21" fill="#1b1b1f">11 月起籌備、確認名單與攤位 → 12/14 </text>
<text x="84" y="584" font-size="21" fill="#1b1b1f">當天 13:30 場佈、12:30 起試音、</text>
<text x="84" y="614" font-size="21" fill="#1b1b1f">16:00 開演、20:00 收場。</text>
<rect x="656" y="452" width="568" height="200" fill="#ffffff" stroke="#e2e0d9" stroke-width="1.5"/>
<rect x="656" y="452" width="6" height="200" fill="#0f7a50"/>
<text x="684" y="496" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="26" font-weight="700" fill="#0f7a50">04</text>
<text x="728" y="496" font-size="25" font-weight="700" fill="#1b1b1f">我的角色 · 節目統籌</text>
<text x="728" y="516" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="13" letter-spacing="2" fill="#6c6c72">MY ROLE — PROGRAM LEAD</text>
<text x="684" y="554" font-size="21" fill="#1b1b1f">確認 13 組演出名單、設計試音時間表、掌控現場</text>
<text x="684" y="584" font-size="21" fill="#1b1b1f">換場與器材／音響規格，並親自擔任 DJ。</text>
<rect x="56" y="676" width="568" height="200" fill="#ffffff" stroke="#e2e0d9" stroke-width="1.5"/>
<rect x="56" y="676" width="6" height="200" fill="#0f7a50"/>
<text x="84" y="720" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="26" font-weight="700" fill="#0f7a50">05</text>
<text x="128" y="720" font-size="25" font-weight="700" fill="#1b1b1f">規模 · 製作</text>
<text x="128" y="740" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="13" letter-spacing="2" fill="#6c6c72">SCOPE</text>
<text x="84" y="778" font-size="21" fill="#1b1b1f">13 組演出、約 48 位表演者；完整舞台音響（</text>
<text x="84" y="808" font-size="21" fill="#1b1b1f">主喇叭、6 路監聽、6 支無線麥、鼓／鍵盤／貝斯</text>
<text x="84" y="838" font-size="21" fill="#1b1b1f">收音）；3 間教會協作。</text>
<rect x="656" y="676" width="568" height="200" fill="#ffffff" stroke="#e2e0d9" stroke-width="1.5"/>
<rect x="656" y="676" width="6" height="200" fill="#0f7a50"/>
<text x="684" y="720" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="26" font-weight="700" fill="#0f7a50">06</text>
<text x="728" y="720" font-size="25" font-weight="700" fill="#1b1b1f">成果 · 復盤</text>
<text x="728" y="740" font-family="'JetBrains Mono','SFMono-Regular',monospace" font-size="13" letter-spacing="2" fill="#6c6c72">OUTCOME / RETRO</text>
<text x="684" y="778" font-size="21" fill="#1b1b1f">4 小時節目準時跑完、換場用市集與主持填補不冷場</text>
<text x="684" y="808" font-size="21" fill="#1b1b1f">。復盤：下次更早鎖定器材需求。〔人數與回饋待補〕</text>
